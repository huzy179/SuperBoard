name: CD

on:
  push:
    branches: [main]

concurrency:
  group: cd-${{ github.sha }}
  cancel-in-progress: false

jobs:
  # ─── Detect which apps changed ────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      ai-service: ${{ steps.filter.outputs.ai-service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/shared/**'
              - 'packages/ui/**'
              - 'packages/config-ts/**'
            api:
              - 'apps/api/**'
              - 'packages/shared/**'
              - 'packages/config-ts/**'
            ai-service:
              - 'apps/ai-service/**'

  # ─── Web ──────────────────────────────────────────────────────────────────
  deploy-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Web Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.web
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/superboard-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/superboard-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy web
        run: echo "TODO — add your web deploy step here (Vercel/Fly/etc)"

  # ─── API ──────────────────────────────────────────────────────────────────
  deploy-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.api
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/superboard-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/superboard-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run migrations
        run: |
          echo "TODO: Use a temporary container to run migrations in production"
          # docker run --rm -e DATABASE_URL=${{ secrets.DATABASE_URL }} my-api-image pnpm db:deploy

      - name: Deploy API
        run: echo "TODO — add your api deploy step here (Fly/Railway/etc)"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          ELASTICSEARCH_URL: ${{ secrets.ELASTICSEARCH_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          AI_SERVICE_URL: ${{ secrets.AI_SERVICE_URL }}

  # ─── AI Service ───────────────────────────────────────────────────────────
  deploy-ai-service:
    needs: changes
    if: needs.changes.outputs.ai-service == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push AI Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.ai
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/superboard-ai:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/superboard-ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy AI service
        run: echo "TODO — add your ai-service deploy step here"
