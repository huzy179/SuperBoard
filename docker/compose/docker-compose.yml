# SuperBoard — Unified Docker Infrastructure
#
# Usage:
#   - Core Dev: docker compose up -d
#   - Full Infra: docker compose --profile full up -d
#   - Monitoring: docker compose --profile monitoring up -d
#   - Everything: docker compose --profile full --profile monitoring up -d

services:
  # ===== Core Database Services =====
  postgres:
    image: pgvector/pgvector:pg16
    container_name: superboard-postgres
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: superboard
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../config/postgres/init-keycloak-db.sql:/docker-entrypoint-initdb.d/01-init-keycloak-db.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dev -d superboard']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - superboard

  redis:
    image: redis:7-alpine
    container_name: superboard-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - superboard

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: superboard-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-dev}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-devpassword}
      RABBITMQ_DEFAULT_VHOST: superboard
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - superboard

  # ===== Application Services (Default) =====
  api:
    profiles: [app]
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: superboard-api
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dev:devpassword@postgres:5432/superboard
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-superboard}:${RABBITMQ_PASS:-password}@rabbitmq:5672/superboard
      JWT_SECRET: superboard-secure-secret-2024
      # Dev-only helper endpoint: GET /api/v1/_debug/routes
      ENABLE_DEBUG_ROUTES: 'true'
      PRISMA_CLIENT_ENGINE_TYPE: binary
      PRISMA_CLI_QUERY_ENGINE_TYPE: binary
    networks:
      - superboard

  web:
    profiles: [app]
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: superboard-web
    ports:
      - '3000:3000'
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
    networks:
      - superboard

  collab-service:
    profiles: [app]
    build:
      context: ../..
      dockerfile: apps/collab-service/Dockerfile
    container_name: superboard-collab
    ports:
      - '1234:1234'
    environment:
      - DATABASE_URL=postgresql://dev:devpassword@postgres:5432/superboard?schema=public
      - JWT_SECRET=superboard-secure-secret-2024
      - PRISMA_CLIENT_ENGINE_TYPE=binary
      - PRISMA_CLI_QUERY_ENGINE_TYPE=binary
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - superboard

  collaboration:
    profiles: [app]
    build:
      context: ../..
      dockerfile: apps/collaboration/Dockerfile
    container_name: superboard-collaboration
    ports:
      - '3001:3001'
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    networks:
      - superboard

  # ===== Full Stack Services (Profile: full) =====
  minio:
    profiles: [full]
    image: minio/minio
    container_name: superboard-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - superboard

  elasticsearch:
    profiles: [full]
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: superboard-elasticsearch
    ports:
      - '9200:9200'
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - superboard

  keycloak:
    profiles: [full]
    image: quay.io/keycloak/keycloak:24.0
    container_name: superboard-keycloak
    ports:
      - '8080:8080'
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: dev
      KC_DB_PASSWORD: devpassword
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - superboard

  mailhog:
    profiles: [full]
    image: mailhog/mailhog
    container_name: superboard-mailhog
    ports:
      - '1025:1025'
      - '8025:8025'
    networks:
      - superboard

  ai-service:
    profiles: [full]
    build:
      context: ../..
      dockerfile: apps/ai-service/Dockerfile
    container_name: superboard-ai-service
    ports:
      - '50051:50051'
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      AMQP_URL: amqp://${RABBITMQ_USER:-dev}:${RABBITMQ_PASS:-devpassword}@rabbitmq:5672/superboard
      NODE_ENV: production
    networks:
      - superboard

  # ===== Monitoring Stack (Profile: monitoring) =====
  prometheus:
    profiles: [monitoring]
    image: prom/prometheus:latest
    container_name: superboard-prometheus
    volumes:
      - ../config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - '9090:9090'
    networks:
      - superboard

  grafana:
    profiles: [monitoring]
    image: grafana/grafana-oss:latest
    container_name: superboard-grafana
    ports:
      - '3001:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ../config/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - superboard

volumes:
  postgres_data:
  minio_data:
  elasticsearch_data:
  grafana_data:
  rabbitmq_data:

networks:
  superboard:
    driver: bridge
