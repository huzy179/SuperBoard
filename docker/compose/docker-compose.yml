# SuperBoard — Unified Docker Infrastructure
#
# Usage:
#   - Core Dev: docker compose up -d
#   - Full Infra: docker compose --profile full up -d
#   - Monitoring: docker compose --profile monitoring up -d
#   - Everything: docker compose --profile full --profile monitoring up -d

services:
  # ===== Core Database Services =====
  postgres:
    image: pgvector/pgvector:pg16
    container_name: superboard-postgres
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../config/postgres/init-keycloak-db.sql:/docker-entrypoint-initdb.d/01-init-keycloak-db.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dev -d superboard']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - superboard

  redis:
    image: redis:7-alpine
    container_name: superboard-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - superboard

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: superboard-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - superboard

  # ===== Application Services (Default) =====
  api:
    profiles: [app]
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: superboard-api
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/${RABBITMQ_VHOST}
      JWT_SECRET: ${JWT_SECRET}
      # Dev-only helper endpoint: GET /api/v1/_debug/routes
      ENABLE_DEBUG_ROUTES: 'true'
      PRISMA_CLIENT_ENGINE_TYPE: binary
      PRISMA_CLI_QUERY_ENGINE_TYPE: binary
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:4000/api/v1/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - superboard

  web:
    profiles: [app]
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: superboard-web
    ports:
      - '3000:3000'
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:3000', (res) => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1));",
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - superboard

  collab-service:
    profiles: [app]
    build:
      context: ../..
      dockerfile: apps/collab-service/Dockerfile
    container_name: superboard-collab
    ports:
      - '1234:1234'
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - PRISMA_CLIENT_ENGINE_TYPE=binary
      - PRISMA_CLI_QUERY_ENGINE_TYPE=binary
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:3001/ready', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - superboard

  collaboration:
    profiles: [app]
    build:
      context: ../..
      dockerfile: apps/collaboration/Dockerfile
    container_name: superboard-collaboration
    ports:
      - '3001:3001'
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:3001/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - superboard

  # ===== Full Stack Services (Profile: full) =====
  minio:
    profiles: [full]
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    container_name: superboard-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - superboard

  elasticsearch:
    profiles: [full]
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: superboard-elasticsearch
    ports:
      - '9200:9200'
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - superboard

  keycloak:
    profiles: [full]
    image: quay.io/keycloak/keycloak:24.0
    container_name: superboard-keycloak
    ports:
      - '8080:8080'
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - superboard

  mailhog:
    profiles: [full]
    image: mailhog/mailhog@sha256:8d76a3d4ffa32a3661311944007a415332c4bb855657f4f6c57996405c009bea
    container_name: superboard-mailhog
    ports:
      - '1025:1025'
      - '8025:8025'
    networks:
      - superboard

  ai-service:
    profiles: [full]
    build:
      context: ../..
      dockerfile: apps/ai-service/Dockerfile
    container_name: superboard-ai-service
    ports:
      - '50051:50051'
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      AMQP_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/${RABBITMQ_VHOST}
      NODE_ENV: production
    networks:
      - superboard

  # ===== Monitoring Stack (Profile: monitoring) =====
  prometheus:
    profiles: [monitoring]
    image: prom/prometheus@sha256:e4254400b85610324913f0dc4acf92603d9984e7519414c5a12811aa6146acc3
    container_name: superboard-prometheus
    volumes:
      - ../config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - '9090:9090'
    networks:
      - superboard

  grafana:
    profiles: [monitoring]
    image: grafana/grafana-oss@sha256:0f86bada30d65ef9d0183b90c1e2682ac92d53d95da8bed322b984ea78a4a73a
    container_name: superboard-grafana
    ports:
      - '3002:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ../config/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - superboard

volumes:
  postgres_data:
  minio_data:
  elasticsearch_data:
  grafana_data:
  rabbitmq_data:

networks:
  superboard:
    driver: bridge
