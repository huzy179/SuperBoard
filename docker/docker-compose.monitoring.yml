# SuperBoard — Monitoring infrastructure
# Services: prometheus, grafana

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: superboard-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - '9090:9090'
    networks:
      - superboard
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:latest
    container_name: superboard-grafana
    ports:
      - '3001:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - superboard
    restart: unless-stopped

volumes:
  grafana_data:

networks:
  superboard:
    external: true
