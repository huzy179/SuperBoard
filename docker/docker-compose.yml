# SuperBoard — Minimal dev infrastructure
# Services: postgres, redis (only what Jira MVP actually needs)
# Usage: docker compose -f docker-compose.yml up -d
# For full infra (unused services): docker compose -f docker-compose.full.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: superboard-postgres
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: superboard
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dev -d superboard']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - superboard

  redis:
    image: redis:7-alpine
    container_name: superboard-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - superboard

volumes:
  postgres_data:

networks:
  superboard:
    driver: bridge
