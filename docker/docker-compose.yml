# SuperBoard — Minimal dev infrastructure
# Services: postgres, redis (only what Jira MVP actually needs)
# Usage: docker compose -f docker-compose.yml up -d
# For full infra (unused services): docker compose -f docker-compose.full.yml up -d

services:
  postgres:
    image: pgvector/pgvector:16-pg16
    container_name: superboard-postgres
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: superboard
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dev -d superboard']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - superboard

  redis:
    image: redis:7-alpine
    container_name: superboard-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - superboard

  mailhog:
    image: mailhog/mailhog
    container_name: superboard-mailhog
    ports:
      - '1025:1025'
      - '8025:8025'
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:8025 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - superboard

  collab-service:
    build:
      context: ..
      dockerfile: ./docker/collab.Dockerfile
    container_name: superboard-collab
    ports:
      - '1234:1234'
    environment:
      - DATABASE_URL=postgresql://dev:devpassword@postgres:5432/superboard?schema=public
      - JWT_SECRET=superboard-secure-secret-2024
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - superboard

volumes:
  postgres_data:

networks:
  superboard:
    driver: bridge
