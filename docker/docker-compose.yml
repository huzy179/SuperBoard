services:
  # ===== Database Services =====
  postgres:
    image: postgres:16-alpine
    container_name: superboard-postgres
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: superboard
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-keycloak-db.sql:/docker-entrypoint-initdb.d/01-init-keycloak-db.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dev -d superboard']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - superboard

  redis:
    image: redis:7-alpine
    container_name: superboard-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - superboard

  # ===== Storage & Search =====
  minio:
    image: minio/minio
    container_name: superboard-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:9000/minio/health/live || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - superboard

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: superboard-elasticsearch
    ports:
      - '9200:9200'
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:9200/_cluster/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - superboard

  # ===== Authentication & Communication =====
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: superboard-keycloak
    ports:
      - '8080:8080'
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: dev
      KC_DB_PASSWORD: devpassword
      KC_HEALTH_ENABLED: 'true'
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', "bash -c '</dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - superboard

  mailhog:
    image: mailhog/mailhog
    container_name: superboard-mailhog
    ports:
      - '1025:1025'
      - '8025:8025'
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:8025 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - superboard

  # ===== Application Services =====
  ai-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ai
    container_name: superboard-ai-service
    ports:
      - '50051:50051'
    depends_on:
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
    networks:
      - superboard

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: superboard-api
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dev:devpassword@postgres:5432/superboard
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080
    networks:
      - superboard

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: superboard-web
    ports:
      - '3001:3001'
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://api:3000
    networks:
      - superboard

volumes:
  postgres_data:
  minio_data:
  elasticsearch_data:

networks:
  superboard:
    driver: bridge
