name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/backend-shared/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/backend-shared/**'
  release:
    types: [published]

jobs:
  test-typescript:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd packages/backend-shared
          npm ci

      - name: Run linting
        run: |
          cd packages/backend-shared
          npm run lint

      - name: Run type checking
        run: |
          cd packages/backend-shared
          npm run typecheck

      - name: Run tests
        run: |
          cd packages/backend-shared
          npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: packages/backend-shared/coverage/lcov.info
          flags: typescript
          name: typescript-coverage

  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          cd packages/backend-shared/python
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run linting
        run: |
          cd packages/backend-shared/python
          flake8 superboard_shared
          black --check superboard_shared

      - name: Run type checking
        run: |
          cd packages/backend-shared/python
          mypy superboard_shared

      - name: Run tests
        run: |
          cd packages/backend-shared/python
          pytest --cov=superboard_shared --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: packages/backend-shared/python/coverage.xml
          flags: python
          name: python-coverage

  integration-tests:
    runs-on: ubuntu-latest
    needs: [test-typescript, test-python]

    services:
      rabbitmq:
        image: rabbitmq:3.12-management
        env:
          RABBITMQ_DEFAULT_USER: test
          RABBITMQ_DEFAULT_PASS: test
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd packages/backend-shared
          npm ci
          cd python
          pip install -e .[test]

      - name: Run integration tests
        run: |
          cd packages/backend-shared
          npm run test:integration
          cd python
          pytest tests/integration/
        env:
          RABBITMQ_URL: amqp://test:test@localhost:5672
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://test:test@localhost:5432/test

  build-and-publish:
    runs-on: ubuntu-latest
    needs: [test-typescript, test-python, integration-tests]
    if: github.event_name == 'release'

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd packages/backend-shared
          npm ci
          cd python
          pip install build twine

      - name: Build TypeScript package
        run: |
          cd packages/backend-shared
          npm run build

      - name: Build Python package
        run: |
          cd packages/backend-shared/python
          python -m build

      - name: Publish to npm (if private registry configured)
        run: |
          cd packages/backend-shared
          # npm publish --access restricted
          echo "NPM publish would happen here for private registry"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to PyPI (if private registry configured)
        run: |
          cd packages/backend-shared/python
          # twine upload dist/*
          echo "PyPI publish would happen here for private registry"
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
